<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello Team One Hundred</title>
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    height: 100%;
  }

  body {
    background-color: #ffffff;
    color: #111111;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  h1 {
    font-size: clamp(1.75rem, 4vw, 3rem);
    font-weight: 600;
    letter-spacing: -0.02em;
    text-align: center;
    color: #111111;
  }

  footer {
    padding: 24px 16px;
    text-align: center;
    border-top: 1px solid #f0f0f0;
    font-size: 0.8rem;
    color: #888888;
    line-height: 1.7;
  }

  footer a {
    color: #888888;
    text-decoration: underline;
  }

  footer a:hover {
    color: #111111;
  }
</style>
</head>
<body>

<main>
  <h1>Hello Team One Hundred</h1>
</main>

<footer>
  <p>Investment decisions remain solely with the individual investor.</p>
  <p><a href="https://skalatsky.com/index.html">Site by Skalatsky &amp; Associates</a></p>
</footer>

</body>
</html>
