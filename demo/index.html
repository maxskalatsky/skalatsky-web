<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome, Horatio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Georgia, 'Times New Roman', serif;
            background: #f9f8f6;
            color: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            padding: 60px 40px;
        }
        h1 {
            font-size: 3.5rem;
            font-weight: 400;
            letter-spacing: 0.02em;
            margin-bottom: 12px;
        }
        .subtitle {
            font-size: 1.15rem;
            color: #555;
            font-style: italic;
            margin-bottom: 80px;
        }
        .signature {
            font-size: 1.1rem;
            color: #333;
            border-top: 1px solid #ccc;
            display: inline-block;
            padding-top: 16px;
        }
        .signature .name {
            font-weight: 600;
            font-size: 1.25rem;
        }
        .signature a {
            color: #666;
            font-size: 0.95rem;
            margin-top: 4px;
            display: block;
            text-decoration: none;
        }
        .signature a:hover {
            color: #1a1a2e;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello, Horatio</h1>
        <p class="subtitle">Welcome — we're glad you're here.</p>
        <div class="signature">
            <div class="name">Max Skalatsky</div>
            <a href="https://skalatsky.com">skalatsky.com</a>
        </div>
    </div>
</body>
</html>
