<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello to S&A Demo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f5f5;
    color: #111111;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .hero {
    background: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    padding: 80px 24px;
    text-align: center;
  }

  .hero h1 {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #111111;
    margin-bottom: 16px;
  }

  .hero p {
    font-size: 1.125rem;
    color: #555555;
    max-width: 480px;
  }

  footer {
    background: #111111;
    color: #ffffff;
    text-align: center;
    padding: 24px 16px;
    font-size: 0.875rem;
    line-height: 1.8;
  }

  footer a {
    color: #ffffff;
    text-decoration: underline;
  }

  footer a:hover {
    color: #cccccc;
  }
</style>
</head>
<body>

<section class="hero">
  <h1>Hello to S&amp;A Demo</h1>
  <p>Welcome to the Skalatsky &amp; Associates demonstration page.</p>
</section>

<footer>
  <p>This is the first version of the page.</p>
  <p><a href="https://skalatsky.com/index.html">Site by Skalatsky &amp; Associates</a></p>
</footer>

</body>
</html>
