<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello World</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #ffffff;
    color: #111111;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
  }

  .hero {
    text-align: center;
    max-width: 560px;
  }

  .hero h1 {
    font-size: clamp(2.5rem, 6vw, 4rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #111111;
    margin-bottom: 16px;
  }

  .hero p {
    font-size: 1.125rem;
    color: #555555;
    line-height: 1.6;
  }

  footer {
    padding: 24px;
    text-align: center;
    border-top: 1px solid #f0f0f0;
    font-size: 0.875rem;
    color: #888888;
    line-height: 1.8;
  }

  footer a {
    color: #111111;
    text-decoration: none;
  }

  footer a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>

<main>
  <div class="hero">
    <h1>Hello, World.</h1>
    <p>Clean. Simple. Ready.</p>
  </div>
</main>

<footer>
  This is the first version of the page.<br>
  <a href="https://skalatsky.com/index.html">Site by Skalatsky &amp; Associates</a>
</footer>

</body>
</html>
