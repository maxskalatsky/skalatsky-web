peat(2, max-content);\n    justify-content: center;\n    column-gap: 24px;\n    row-gap: 8px;\n    font-size: 13px;\n    color: #4b5563;\n  }\n  .legend span {\n    display: flex;\n    align-items: center;\n    gap: 6px;\n  }\n  .swatch {\n    width: 11px;\n    height: 11px;\n    border-radius: 2px;\n    flex-shrink: 0;\n  }\n<\/style>\n<\/head>\n<body>\n<div class=\"wrap\">\n  <h1>US AI Adoption<\/h1>\n  <p class=\"sub\">Each dot is about 136,000 Americans<\/p>\n\n  <div id=\"gridWrap\">\n    <div id=\"grid\" role=\"img\" aria-label=\"Dot grid of US AI adoption tiers with a Florida detail panel embedded in the grey zone\"><\/div>\n\n    <div id=\"flBox\">\n      <p class=\"fl-title\">Florida<\/p>\n      <div class=\"donut-wrap\">\n        <canvas id=\"flDonut\" role=\"img\" aria-label=\"Donut chart of Florida AI adoption in absolute numbers, about 11.0 million never used AI, 11.1 million free chatbot users, 1.28 million pay for AI, and 47 thousand use a coding scaffold\">Florida: never used AI 11.0M, free chatbot 11.1M, pays for AI 1.28M, coding scaffold 47K.<\/canvas>\n        <div class=\"donut-center\">\n          <span class=\"val\">about 47K<\/span>\n          <span class=\"lbl\">coding scaffold users<\/span>\n        <\/div>\n      <\/div>\n      <p class=\"fl-foot\">about 12.4M AI users in FL<\/p>\n    <\/div>\n  <\/div>\n\n  <div class=\"legend\">\n    <span><span class=\"swatch\" style=\"background:var(--gray)\"><\/span>Never used AI &middot; about 160M (47%)<\/span>\n    <span><span class=\"swatch\" style=\"background:var(--blue)\"><\/span>Free chatbot user &middot; about 157M (46%)<\/span>\n    <span><span class=\"swatch\" style=\"background:var(--navy)\"><\/span>Pays for AI &middot; about 21.9M (6.4%)<\/span>\n    <span><span class=\"swatch\" style=\"background:var(--teal)\"><\/span>Uses coding scaffold &middot; about 1.3M (0.4%)<\/span>\n  <\/div>\n<\/div>\n\n<script>\n  var counts = [\n    { n: 1176, c: '#d0dce8' },\n    { n: 1154, c: '#0069AA' },\n    --blue: #006699;\n    --blue-tint: #f0f6fb;\n    --teal: #00C99C;\n    --teal-tint: #e9faf5;\n    --ink: #1a1a1a;\n    --body: #4b5563;\n    --muted: #6b7280;\n    --faint: #9ca3af;\n  }\n  * { box-sizing: border-box; }\n  body {\n    font-family: 'Open Sans', system-ui, -apple-system, 'Segoe UI', sans-serif;\n    background: #ffffff;\n    color: var(--ink);\n    margin: 0;\n    padding: 56px 24px;\n  }\n  .wrap { max-width: 720px; margin: 0 auto; }\n  h1 {\n    text-align: center;\n    font-size: 27px;\n    font-weight: 700;\n    margin: 0 0 8px;\n    color: var(--navy);\n  }\n  .row { position: relative; height: 172px; margin-bottom: 18px; }\n  .box {\n    position: absolute;\n    top: 0;\n    height: 100%;\n    width: calc((100% - 32px) / 3);\n    border-radius: 12px;\n    border: 1px solid var(--cat);\n    background: var(--tint);\n    padding: 20px 24px;\n    overflow: hidden;\n    transition: left 0.25s ease, width 0.25s ease;\n    z-index: 1;\n  }\n  .box:nth-child(1) { left: 0; }\n  .box:nth-child(2) { left: calc((100% - 32px) / 3 + 16px); }\n  .box:nth-child(3) { left: calc(((100% - 32px) / 3) * 2 + 32px); }\n  .box:hover { left: 0; width: 100%; z-index: 10; }\n  .content { display: flex; flex-direction: column; justify-content: center; height: 100%; }\n  .box:hover .content { justify-content: flex-start; }\n  .title { font-size: 19px; font-weight: 700; color: var(--ink); margin: 0; }\n  .sub2 { font-size: 14px; color: var(--muted); margin: 5px 0 0; }\n  .desc {\n    font-size: 14px;\n    line-height: 1.6;\n    color: var(--body);\n    margin-top: 0;\n    max-height: 0;\n    opacity: 0;\n    overflow: hidden;\n    transition: max-height 0.25s ease, opacity 0.2s ease, margin-top 0.25s ease;\n  }\n  .box:hover .desc { max-height: 130px; opacity: 1; margin-top: 14px; }\n  .legend {\n    display: flex;\n    justify-content: center;\n    gap: 22px;\n    margin-top: 30px;\n    font-size: 12px;\n    color: var(--muted);\n  }\n  .legend span { display: flex; align-items: center; gap: 6px; }\n  .legend .sw { width: 12px; height: 12px; border-radius: 3px; }\n  .credit { text-align: center; font-size: 11px; color: var(--faint); margin: 24px 0 0; }\n  .byline { text-align: center; font-size: 14px; color: #6b7280; margin: 0 0 28px; }\n<\/style>\n<\/head>\n<body>\n<div class=\"wrap\">\n  <h1>As tech accelerates, what stays the same?<\/h1>\n  <p class=\"byline\">Six things that won't change<\/p>\n\n  <div class=\"row\">\n    <div class=\"box\" style=\"--cat: var(--navy); --tint: var(--navy-tint);\">\n      <div class=\"content\">\n        <p class=\"title\">Bodies are finite<\/p>\n        <p class=\"sub2\">Food, shelter, health<\/p>\n        <p class=\"desc\">Shelter, food, energy, healthcare, aging, and a fixed 24 hours a day are all one fact. Biology imposes hard limits no technology removes.<\/p>\n      <\/div>\n    <\/div>\n    <div class=\"box\" style=\"--cat: var(--blue); --tint: var(--blue-tint);\">\n      <div class=\"content\">\n        <p class=\"title\">People prefer now<\/p>\n        <p class=\"sub2\">Capital seeks returns<\/p>\n        <p class=\"desc\">Preferring more now over less later drives demand for credit, capital chasing returns above inflation, and multigenerational wealth thinking. One instinct, many markets.<\/p>\n      <\/div>\n    <\/div>\n    <div class=\"box\" style=\"--cat: var(--teal); --tint: var(--teal-tint);\">\n      <div class=\"content\">\n        <p class=\"title\">Trust stays scarce<\/p>\n        <p class=\"sub2\">Verification costs<\/p>\n        <p class=\"desc\">As content, code, and fraud get cheaper to produce, whatever can prove it is real becomes more valuable. Reputation and curation are trust in different clothes.<\/p>\n      <\/div>\n    <\/div>\n  <\/div>\n\n  <div class=\"row\">\n    <div class=\"box\" style=\"--cat: var(--navy); --tint: var(--navy-tint);\">\n      <div class=\"content\">\n        <p class=\"title\">Physics sets limits<\/p>\n        <p class=\"sub2\">Energy powers tech<\/p>\n        <p class=\"desc\">Atoms move slower and cost more than bits. Every increase in computational capability demands more energy, so the physical world sets the pace.<\/p>\n      <\/div>\n    <\/div>\n    <div class=\"box\" style=\"--cat: var(--blue); --tint: var(--blue-tint);\">\n      <div class=\"content\">\n        <p class=\"title\">Coordination costs<\/p>\n        <p class=\"sub2\">Firms and moats<\/p>\n        <p class=\"desc\">Friction between parties never fully disappears. That is why firms, licensing, and proprietary data persist as moats even once machines can do the underlying task.<\/p>\n      <\/div>\n    <\/div>\n    <div class=\"box\" style=\"--cat: var(--teal); --tint: var(--teal-tint);\">\n      <div class=\"content\">\n        <p class=\"title\">Status endures<\/p>\n        <p class=\"sub2\">People seek belonging<\/p>\n        <p class=\"desc\">Humans compete for relative position and want to belong somewhere, not just be served efficiently. That is why status signaling and community keep surviving disruption.<\/p>\n      <\/div>\n    <\/div>\n  <\/div>\n\n  <div class=\"legend\">\n    <span><span class=\"sw\" style=\"background:var(--navy);\"><\/span>Physical world<\/span>\n    <span><span class=\"sw\" style=\"background:var(--blue);\"><\/span>Economic systems<\/span>\n    <span><span class=\"sw\" style=\"background:var(--teal);\"><\/span>Social and trust<\/span>\n  <\/div>\n<\/div>\n<\/body>\n<\/html>\n"}, {"title": "Where does the time go?", "html": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Where the time goes<\/title>\n<link href=\"https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap\" rel=\"stylesheet\">\n<style>\n  :root {\n    --navy: #0d2d6b;\n    --brand: #006699;\n    --midblue: #0069AA;\n    --deepblue: #004F82;\n    --teal: #00C99C;\n    --teal-tint: #e9faf5;\n    --ink: #1a1a1a;\n    --body: #4b5563;\n    --muted: #6b7280;\n    --faint: #9ca3af;\n    --hairline: #e2eaf0;\n  }\n  * { box-sizing: border-box; }\n  body {\n    font-family: 'Open Sans', system-ui, -apple-system, 'Segoe UI', sans-serif;\n    background: #ffffff;\n    color: var(--ink);\n    margin: 0;\n    padding: 56px 24px;\n  }\n  .wrap { max-width: 720px; margin: 0 auto; }\n  h1 { text-align: center; font-size: 27px; font-weight: 700; color: var(--navy); margin: 0 0 8px; }\n  .sub { text-align: center; font-size: 14px; color: var(--muted); margin: 0 0 40px; }\n\n  .era { margin-bottom: 4px; }\n  .era-label { font-size: 14px; font-weight: 700; color: var(--navy); margin: 0 0 8px; }\n\n  .bar {\n    display: flex;\n    height: 48px;\n    border-radius: 8px;\n    overflow: hidden;\n    border: 1px solid var(--hairline);\n  }\n  .seg {\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    color: #fff;\n    font-weight: 700;\n    font-size: 14px;\n  }\n  .seg.small { font-size: 12px; }\n  .seg.hot {\n    cursor: pointer;\n    transition: filter 0.15s ease;\n  }\n  .seg.hot:hover { filter: brightness(1.18); }\n\n  .detail-panel {\n    max-height: 0;\n    opacity: 0;\n    overflow: hidden;\n    transition: max-height 0.26s ease, opacity 0.2s ease;\n    margin-top: 0;\n  }\n  .detail-panel.open {\n    max-height: 110px;\n    opacity: 1;\n    margin-top: 6px;\n  }\n  .detail-inner {\n    border-left: 4px solid var(--panel-accent, var(--brand));\n    background: #f7f9fb;\n    border-radius: 8px;\n    padding: 12px 18px;\n  }\n  .detail-tag {\n    font-size: 10.5px;\n    font-weight: 800;\n    letter-spacing: 0.15em;\n    text-transform: uppercase;\n    color: var(--panel-accent, var(--brand));\n    margin: 0 0 5px;\n  }\n  .detail-copy {\n    font-size: 13px;\n    line-height: 1.6;\n    color: var(--body);\n    margin: 0;\n  }\n\n  .era-note { font-size: 12px; color: var(--faint); margin: 8px 0 28px; }\n\n  .callout {\n    border-left: 4px solid var(--teal);\n    background: var(--teal-tint);\n    border-radius: 8px;\n    padding: 20px 24px;\n    margin: 8px 0 32px;\n  }\n  .callout p { font-size: 14px; line-height: 1.6; color: var(--body); margin: 0; }\n\n  .legend {\n    display: flex;\n    justify-content: center;\n    gap: 24px;\n    flex-wrap: wrap;\n    font-size: 12px;\n    color: var(--muted);\n  }\n  .legend span { display: flex; align-items: center; gap: 6px; }\n  .legend .sw { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }\n  .credit { text-align: center; font-size: 11px; color: var(--faint); margin: 32px 0 0; }\n<\/style>\n<\/head>\n<body>\n<div class=\"wrap\">\n  <h1>Where does the time go?<\/h1>\n  <p class=\"sub\">Traditional development cycle: then versus now<\/p>\n\n  <div class=\"era\">\n    <p class=\"era-label\">2 to 5 years ago<\/p>\n    <div class=\"bar\">\n      <div class=\"seg small\" style=\"width:10%; background:var(--navy);\">Plan<\/div>\n      <div class=\"seg hot\" data-panel=\"old-build\" style=\"width:50%; background:var(--brand);\">Build<\/div>\n      <div class=\"seg hot\" data-panel=\"old-test\"  style=\"width:30%; background:var(--midblue);\">Test<\/div>\n      <div class=\"seg small\" style=\"width:10%; background:var(--deepblue);\">Ship<\/div>\n    <\/div>\n    <div class=\"detail-panel\" id=\"old-build\">\n      <div class=\"detail-inner\" style=\"--panel-accent: #006699;\">\n        <p class=\"detail-tag\">Build · 50% of the cycle<\/p>\n        <p class=\"detail-copy\">Writing every line by hand. This was the work of a full team, sprint after sprint. One feature shipped. Another queued behind it. The model was: hire more engineers, get more done.<\/p>\n      <\/div>\n    <\/div>\n    <div class=\"detail-panel\" id=\"old-test\">\n      <div class=\"detail-inner\" style=\"--panel-accent: #0069AA;\">\n        <p class=\"detail-tag\">Test · 30% of the cycle<\/p>\n        <p class=\"detail-copy\">Finding what broke after you built it. Every bug sent work backward. Test was reactive by design. You could not know what broke until the build was done. Nearly as large a job as writing the code itself.<\/p>\n      <\/div>\n    <\/div>\n    <p class=\"era-note\">Most of the cycle went to writing code by hand, then finding what broke.<\/p>\n  <\/div>\n\n  <div class=\"era\">\n    <p class=\"era-label\">Now<\/p>\n    <div class=\"bar\">\n      <div class=\"seg hot\" data-panel=\"now-plan\" style=\"width:50%; background:var(--navy);\">Plan<\/div>\n      <div class=\"seg small\" style=\"width:20%; background:var(--brand);\">Build<\/div>\n      <div class=\"seg small\" style=\"width:10%; background:var(--midblue);\">Test<\/div>\n      <div class=\"seg hot small\" data-panel=\"now-ship\" style=\"width:20%; background:var(--deepblue);\">Ship<\/div>\n    <\/div>\n    <div class=\"detail-panel\" id=\"now-plan\">\n      <div class=\"detail-inner\" style=\"--panel-accent: #0d2d6b;\">\n        <p class=\"detail-tag\" style=\"color:#0d2d6b;\">Plan · 50% of the cycle · the new bottleneck<\/p>\n        <p class=\"detail-copy\">AI can build and test, but only against the plan you give it. Context, decisions, and clear acceptance criteria determine everything downstream. This is where judgment lives now. Get it wrong and the output is fast but wrong.<\/p>\n      <\/div>\n    <\/div>\n    <div class=\"detail-panel\" id=\"now-ship\">\n      <div class=\"detail-inner\" style=\"--panel-accent: #004F82;\">\n        <p class=\"detail-tag\">Ship · the starting line, not the finish<\/p>\n        <p class=\"detail-copy\">Shipping is not the outcome. It is where measurement begins. Did the deal close faster? Did the customer resolve on the first pass? Every deployment is a question in disguise. Building toward outcomes means you are ready to answer it.<\/p>\n      <\/div>\n    <\/div>\n    <p class=\"era-note\">AI compresses build and test. The work that is left is deciding what to build and owning what ships.<\/p>\n  <\/div>\n\n  <div class=\"callout\">\n    <p>The bottleneck did not disappear. It moved. Writing and testing code used to be the job. Now judgment is the job: knowing what to build, and standing behind what goes live.<\/p>\n  <\/div>\n\n  <div class=\"legend\">\n    <span><span class=\"sw\" style=\"background:var(--navy);\"><\/span>Plan and acceptance criteria<\/span>\n    <span><span class=\"sw\" style=\"background:var(--brand);\"><\/span>Build and code<\/span>\n    <span><span class=\"sw\" style=\"background:var(--midblue);\"><\/span>Test and debug<\/span>\n    <span><span class=\"sw\" style=\"background:var(--deepblue);\"><\/span>Ship and deploy<\/span>\n  <\/div>\n<\/div>\n\n<script>\n  var panels = {};\n  document.querySelectorAll('.detail-panel').forEach(function(p) {\n    panels[p.id] = p;\n  });\n\n  document.querySelectorAll('.seg.hot').forEach(function(seg) {\n    var panelId = seg.dataset.panel;\n    seg.addEventListener('mouseenter', function() {\n      Object.values(panels).forEach(function(p) { p.classList.remove('open'); });\n      if (panels[panelId]) panels[panelId].classList.add('open');\n    });\n    seg.addEventListener('mouseleave', function() {\n      if (panels[panelId]) panels[panelId].classList.remove('open');\n    });\n  });\n<\/script>\n<\/body>\n<\/html>\n"}, {"title": "Absorption Gap", "html": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>The Absorption Gap<\/title>\n<link href=\"https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap\" rel=\"stylesheet\">\n<style>\n  * { box-sizing: border-box; }\n  body { margin:0; background:#f7f9fb; font-family:\"Open Sans\",system-ui,sans-serif; color:#1a1a1a;\n         display:flex; justify-content:center; padding:36px 20px; }\n<\/style>\n<\/head>\n<body>\n<div style=\"width:1200px; max-width:100%; background:#ffffff; border:1px solid #e2eaf0; border-radius:12px; padding:40px 52px 30px; box-shadow:0 20px 60px rgba(13,45,107,.10);\">\n\n  <div style=\"text-align:center; max-width:780px; margin:0 auto 30px;\">\n    <h1 style=\"font-size:27px; font-weight:700; color:#0d2d6b; margin:0 0 10px; letter-spacing:-.01em;\">Absorption Gap<\/h1>\n    <p style=\"font-size:15px; line-height:1.55; color:#4b5563; margin:0;\">What the product can do sits on one side. What the user can actually take in sits on the other.<\/p>\n  <\/div>\n\n  <div style=\"display:grid; grid-template-columns:230px 1fr 230px; gap:0; align-items:stretch;\">\n\n    <div style=\"border:2px solid #0069AA; border-radius:12px; background:#f7fafd; padding:22px 20px; display:flex; flex-direction:column; z-index:2;\">\n      <div style=\"font-size:16px; font-weight:800; color:#0069AA; margin:0 0 16px; white-space:nowrap;\">Your build is 5x<\/div>\n      <div style=\"display:flex; flex-direction:column; gap:12px;\">\n        <div style=\"font-size:13.5px; line-height:1.5; color:#4b5563; padding-left:14px; border-left:2px solid #cfe0ee;\">The product gets better every few weeks, faster than any roadmap<\/div>\n        <div style=\"font-size:13.5px; line-height:1.5; color:#4b5563; padding-left:14px; border-left:2px solid #cfe0ee;\">The demo is magic and wins the room every time<\/div>\n        <div style=\"font-size:13.5px; line-height:1.5; color:#4b5563; padding-left:14px; border-left:2px solid #cfe0ee;\">The capability is real, and it keeps compounding<\/div>\n      <\/div>\n    <\/div>\n\n    <div style=\"position:relative; margin:0 -14px; padding:36px 38px 22px; display:flex; flex-direction:column; gap:12px; justify-content:center;\n                border-top:2px dashed #00C99C; border-bottom:2px dashed #00C99C;\n                background:repeating-linear-gradient(45deg,#ffffff,#ffffff 11px,#e6faf6 11px,#e6faf6 22px); padding-top:24px; padding-bottom:14px;\">\n      <div style=\"position:absolute; top:-13px; left:50%; transform:translateX(-50%); background:#ffffff; padding:0 14px; white-space:nowrap;\">\n        <span style=\"font-size:12px; font-weight:800; letter-spacing:.2em; color:#00C99C;\">WHERE ROI STALLS<\/span>\n      <\/div>\n\n      <div style=\"align-self:flex-start; width:76%; background:#ffffff; border:1px solid #e2eaf0; border-left:4px solid #0069AA; border-radius:10px; padding:12px 16px; box-shadow:0 4px 14px rgba(13,45,107,.06);\">\n        <div style=\"display:flex; align-items:center; gap:10px;\">\n          <div style=\"width:24px; height:24px; border-radius:50%; background:#0069AA; color:#fff; font-size:12.5px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0;\">1<\/div>\n          <div style=\"font-size:13px; line-height:1.45; color:#4b5563;\"><span style=\"font-size:15px; font-weight:800; color:#0d2d6b;\">Position:<\/span> Sell how the work changes. Not what the model does.<\/div>\n        <\/div>\n      <\/div>\n\n      <div style=\"align-self:flex-start; width:76%; margin-left:8%; background:#ffffff; border:1px solid #e2eaf0; border-left:4px solid #006699; border-radius:10px; padding:12px 16px; box-shadow:0 4px 14px rgba(13,45,107,.06);\">\n        <div style=\"display:flex; align-items:center; gap:10px;\">\n          <div style=\"width:24px; height:24px; border-radius:50%; background:#006699; color:#fff; font-size:12.5px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0;\">2<\/div>\n          <div style=\"font-size:13px; line-height:1.45; color:#4b5563;\"><span style=\"font-size:15px; font-weight:800; color:#0d2d6b;\">Price:<\/span> Charge for value that shows up, not for seats that disappear.<\/div>\n        <\/div>\n      <\/div>\n\n      <div style=\"align-self:flex-start; width:76%; margin-left:16%; background:#ffffff; border:1px solid #e2eaf0; border-right:4px solid #004F82; border-radius:10px; padding:12px 16px; box-shadow:0 4px 14px rgba(13,45,107,.06);\">\n        <div style=\"display:flex; align-items:center; gap:10px;\">\n          <div style=\"width:24px; height:24px; border-radius:50%; background:#004F82; color:#fff; font-size:12.5px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0;\">3<\/div>\n          <div style=\"font-size:13px; line-height:1.45; color:#4b5563;\"><span style=\"font-size:15px; font-weight:800; color:#0d2d6b;\">Proof:<\/span> One live user at a time. Outcome is the new super metric.<\/div>\n        <\/div>\n      <\/div>\n\n      <div style=\"align-self:flex-start; width:76%; margin-left:24%; background:#ffffff; border:1px solid #e2eaf0; border-right:4px solid #0d2d6b; border-radius:10px; padding:12px 16px; box-shadow:0 4px 14px rgba(13,45,107,.06);\">\n        <div style=\"display:flex; align-items:center; gap:10px;\">\n          <div style=\"width:24px; height:24px; border-radius:50%; background:#0d2d6b; color:#fff; font-size:12.5px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0;\">4<\/div>\n          <div style=\"font-size:13px; line-height:1.45; color:#4b5563;\"><span style=\"font-size:15px; font-weight:800; color:#0d2d6b;\">Persona:<\/span> Win the super users. They decide whether the product becomes how work gets done.<\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n\n    <div style=\"border:2px solid #9ca3af; border-radius:12px; background:#fafafa; padding:22px 20px; display:flex; flex-direction:column; z-index:2;\">\n      <div style=\"font-size:16px; font-weight:800; color:#6b7280; margin:0 0 16px; white-space:nowrap;\">Users absorb 1x<\/div>\n      <div style=\"display:flex; flex-direction:column; gap:12px;\">\n        <div style=\"font-size:13.5px; line-height:1.5; color:#6b7280; padding-left:14px; border-left:2px solid #e0e0e0;\">New tools land in old habits<\/div>\n        <div style=\"font-size:13.5px; line-height:1.5; color:#6b7280; padding-left:14px; border-left:2px solid #e0e0e0;\">Approvals, legacy systems, and busy calendars set the pace<\/div>\n        <div style=\"font-size:13.5px; line-height:1.5; color:#6b7280; padding-left:14px; border-left:2px solid #e0e0e0;\">Change lands one team at a time, whatever the roadmap says<\/div>\n      <\/div>\n    <\/div>\n\n  <\/div>\n\n  <p style=\"text-align:center; font-size:15px; font-weight:600; color:#1a1a1a; margin:28px auto 0; max-width:720px; line-height:1.5;\"><span style=\"color:#0d2d6b; font-weight:800;\">The 4 Ps of AI Product Marketing:<\/span> Shipping product is easy. The real work is getting it absorbed.<\/p>\n\n<\/div>\n<\/body>\n<\/html>\n"}, {"title": "Loop Stack", "html": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Loop Stack<\/title>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n<link href=\"https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap\" rel=\"stylesheet\">\n<style>\n  :root {\n    --navy: #0d2d6b;\n    --brand: #006699;\n    --midblue: #0069AA;\n    --deepblue: #004F82;\n    --darkblue: #003560;\n    --teal: #00C99C;\n    --teal-ink: #0a8a6c;\n    --ink: #1a1a1a;\n    --body: #4b5563;\n    --muted: #6b7280;\n    --faint: #9ca3af;\n    --hairline: #e2eaf0;\n  }\n  * { box-sizing: border-box; }\n  body {\n    font-family: 'Open Sans', system-ui, -apple-system, 'Segoe UI', sans-serif;\n    background: #ffffff;\n    color: var(--ink);\n    margin: 0;\n    padding: 44px 20px;\n  }\n  .wrap { max-width: 860px; margin: 0 auto; }\n\n  /* header */\n  .head { text-align: center; margin-bottom: 30px; }\n  h1 { font-size: 28px; font-weight: 800; color: var(--navy); margin: 0 0 6px; }\n  .byline { font-size: 14px; color: var(--muted); margin: 0; }\n\n  /* nested rings, plain nested boxes */\n  .ring {\n    border: 1.5px solid var(--rc);\n    border-radius: var(--rad);\n    background: var(--bg, #fff);\n    padding: var(--pad);\n    transition: background 0.18s ease;\n  }\n  .ring:hover:not(:has(.ring:hover)) { background: var(--wash); }\n\n  .row {\n    display: grid;\n    grid-template-columns: 1fr auto 1fr;\n    align-items: center;\n    gap: 10px 14px;\n  }\n  .left { display: flex; align-items: center; gap: 10px; width: 100%; }\n  .badge {\n    font-size: 10px; font-weight: 800; letter-spacing: 0.08em;\n    color: var(--rc); background: var(--badgebg);\n    border: 1px solid var(--rc); border-radius: 6px;\n    padding: 2px 6px;\n    flex-shrink: 0;\n  }\n  .name { font-size: 14.5px; font-weight: 800; color: var(--rc); flex-shrink: 0; }\n\n  .mid {\n    justify-self: center;\n    width: 32px; height: 32px;\n    border-radius: 50%;\n    border: 2px solid var(--rc);\n    background: #fff;\n    color: var(--rc);\n    display: flex; align-items: center; justify-content: center;\n    font-size: 16px; font-weight: 800;\n    flex-shrink: 0;\n  }\n\n  .right { display: flex; align-items: center; gap: 10px; width: 100%; }\n  .role {\n    font-size: 14.5px; font-weight: 800; font-style: normal; color: var(--rc);\n    white-space: nowrap; flex-shrink: 0; margin-left: auto;\n    text-transform: capitalize;\n  }\n\n  /* hover reveal: tagline sits against the arrow's left, exit sits against the arrow's right */\n  .tagline, .exit {\n    white-space: nowrap;\n    font-size: 12px;\n    font-style: italic;\n    font-weight: 700;\n    color: var(--rc);\n    opacity: 0;\n    transition: opacity 0.2s ease;\n  }\n  .tagline { margin-left: auto; }\n  .row:hover .tagline, .row:hover .exit { opacity: 1; }\n\n  .l5 { --rc: var(--teal-ink); --rad: 18px; --pad: 22px; --badgebg: #e9faf5; --wash: #f2fdfb; margin-top: 14px; }\n  .l4 { --rc: var(--darkblue); --rad: 16px; --pad: 20px; --badgebg: #eef3f8; --wash: #f5f8fb; margin-top: 16px; }\n  .l3 { --rc: var(--deepblue); --rad: 14px; --pad: 18px; --badgebg: #eef4f9; --wash: #f6f9fc; margin-top: 16px; }\n  .l2 { --rc: var(--midblue);  --rad: 12px; --pad: 16px; --badgebg: #eef6fa; --wash: #f6fafc; margin-top: 16px; }\n  .l1 { --rc: var(--brand);    --rad: 10px; --pad: 15px; --badgebg: #eef6fa; --wash: #f7fafd; margin-top: 16px; }\n\n  .callout {\n    margin-top: 26px;\n    padding: 18px 22px;\n    background: #e9faf5;\n    border-left: 4px solid var(--teal);\n    border-radius: 10px;\n    font-size: 14px;\n    color: var(--ink);\n    line-height: 1.55;\n  }\n  .callout b { color: var(--navy); }\n\n  @media (max-width: 620px) {\n    .row { grid-template-columns: 1fr; justify-items: start; }\n    .mid { justify-self: start; margin: 4px 0; }\n    .right { justify-content: flex-start; justify-self: start; }\n  }\n<\/style>\n<\/head>\n<body>\n<div class=\"wrap\">\n\n  <div class=\"head\">\n    <h1>Loop Stack<\/h1>\n    <p class=\"byline\">Where judgment lives now<\/p>\n  <\/div>\n\n  <div class=\"ring l5\">\n    <div class=\"row\">\n      <div class=\"left\">\n        <span class=\"badge\">L5<\/span>\n        <span class=\"name\">Oversight loop<\/span>\n        <span class=\"tagline\">you live here<\/span>\n      <\/div>\n      <div class=\"mid\">&#8594;<\/div>\n      <div class=\"right\">\n        <span class=\"exit\">yours to call<\/span>\n        <span class=\"role\">always<\/span>\n      <\/div>\n    <\/div>\n\n    <div class=\"ring l4\">\n      <div class=\"row\">\n        <div class=\"left\">\n          <span class=\"badge\">L4<\/span>\n          <span class=\"name\">System loop<\/span>\n          <span class=\"tagline\">improves the whole system<\/span>\n        <\/div>\n        <div class=\"mid\">&#8594;<\/div>\n        <div class=\"right\">\n          <span class=\"exit\">evals and judges say better<\/span>\n          <span class=\"role\">escalation point<\/span>\n        <\/div>\n      <\/div>\n\n      <div class=\"ring l3\">\n        <div class=\"row\">\n          <div class=\"left\">\n            <span class=\"badge\">L3<\/span>\n            <span class=\"name\">Product loop<\/span>\n            <span class=\"tagline\">completes the product<\/span>\n          <\/div>\n          <div class=\"mid\">&#8594;<\/div>\n          <div class=\"right\">\n            <span class=\"exit\">none, by design<\/span>\n            <span class=\"role\">configurable checkpoints<\/span>\n          <\/div>\n        <\/div>\n\n        <div class=\"ring l2\">\n          <div class=\"row\">\n            <div class=\"left\">\n              <span class=\"badge\">L2<\/span>\n              <span class=\"name\">Task loop<\/span>\n              <span class=\"tagline\">completes a spec<\/span>\n            <\/div>\n            <div class=\"mid\">&#8594;<\/div>\n            <div class=\"right\">\n              <span class=\"exit\">spec satisfied, tests pass<\/span>\n              <span class=\"role\">writes the spec<\/span>\n            <\/div>\n          <\/div>\n\n          <div class=\"ring l1\">\n            <div class=\"row\">\n              <div class=\"left\">\n                <span class=\"badge\">L1<\/span>\n                <span class=\"name\">Execution loop<\/span>\n                <span class=\"tagline\">completes a step<\/span>\n              <\/div>\n              <div class=\"mid\">&#8594;<\/div>\n              <div class=\"right\">\n                <span class=\"exit\">no more tool calls<\/span>\n                <span class=\"role\">boundaries only<\/span>\n              <\/div>\n            <\/div>\n          <\/div>\n\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n\n  <div class=\"callout\">\n    <b>The moat isn't the model. It's the loop.<\/b> None of it compounds if the loop cannot survive a restart. A skill that dies on crash resets the investment back to zero.\n  <\/div>\n\n<\/div>\n<\/body>\n<\/html>\n"}, {"title": "Agentic Pod", "html": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Agentic Pod<\/title>\n<link href=\"https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap\" rel=\"stylesheet\">\n<style>\n  * { box-sizing: border-box; }\n  body {\n    font-family: 'Open Sans', system-ui, -apple-system, 'Segoe UI', sans-serif;\n    margin: 0;\n    background: #f7f9fb;\n    color: #1a1a1a;\n    padding: 20px 12px;\n  }\n  .card {\n    max-width: 1000px;\n    margin: 0 auto;\n    background: #fff;\n    border: 1px solid #e2eaf0;\n    border-radius: 12px;\n    box-shadow: 0 10px 30px rgba(0,31,64,.06);\n    padding: 20px 24px 0;\n    overflow: hidden;\n  }\n  .wheel-wrap {\n    max-width: 640px;\n    margin: 0 auto;\n    position: relative;\n  }\n  .wheel-wrap svg { display: block; width: 100%; height: auto; }\n\n  #svgCenterText { transition: opacity 0.18s ease; }\n  #svgCenterText.hidden { opacity: 0; }\n\n  .center-zone {\n    position: absolute;\n    left: 55.3%;\n    top: 50.7%;\n    transform: translate(-50%, -50%);\n    width: 26%;\n    text-align: center;\n    pointer-events: none;\n  }\n  .center-detail {\n    position: absolute;\n    inset: -10px -14px;\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    justify-content: center;\n    opacity: 0;\n    transition: opacity 0.24s ease, transform 0.24s ease;\n    padding: 6px 8px;\n    background: rgba(255,255,255,0.92);\n    border-radius: 10px;\n  }\n  .center-detail.dir-top    { transform: translateY(-12px); }\n  .center-detail.dir-tr     { transform: translate(10px, -10px); }\n  .center-detail.dir-br     { transform: translate(10px, 10px); }\n  .center-detail.dir-bottom { transform: translateY(12px); }\n  .center-detail.dir-bl     { transform: translate(-10px, 10px); }\n  .center-detail.dir-tl     { transform: translate(-10px, -10px); }\n  .center-detail.visible    { opacity: 1; transform: translate(0,0); }\n\n  .d-step {\n    font-size: clamp(9px, 1.3vw, 12px);\n    font-weight: 800;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    margin: 0 0 5px;\n  }\n  .d-title {\n    font-size: clamp(13px, 2vw, 17px);\n    font-weight: 800;\n    color: #0d2d6b;\n    margin: 0 0 6px;\n    line-height: 1.2;\n  }\n  .d-body {\n    font-size: clamp(11px, 1.55vw, 14px);\n    line-height: 1.55;\n    color: #4b5563;\n    margin: 0;\n  }\n\n  .benefits {\n    display: flex;\n    margin: 8px -24px 0;\n    border-top: 1px solid #e2eaf0;\n  }\n  .benefit {\n    flex: 1;\n    display: flex;\n    gap: 10px;\n    align-items: flex-start;\n    padding: 16px 18px;\n  }\n  .benefit:nth-child(even) { background: #f7f9fb; }\n  .benefit svg {\n    flex: none;\n    width: 22px; height: 22px;\n    stroke: #0d2d6b; fill: none;\n    stroke-width: 1.6;\n    stroke-linecap: round; stroke-linejoin: round;\n    margin-top: 1px;\n  }\n  .b-title { font-size: 13px; font-weight: 700; color: #0d2d6b; margin: 0 0 2px; }\n  .b-sub   { font-size: 11px; color: #6b7280; line-height: 1.35; margin: 0; }\n<\/style>\n<\/head>\n<body>\n<div class=\"card\">\n  <div class=\"wheel-wrap\">\n\n    <div class=\"center-zone\">\n      <div class=\"center-detail\" id=\"centerDetail\">\n        <p class=\"d-step\" id=\"dStep\"><\/p>\n        <p class=\"d-title\" id=\"dTitle\"><\/p>\n        <p class=\"d-body\" id=\"dBody\"><\/p>\n      <\/div>\n    <\/div>\n\n    <svg viewBox=\"-10 0 840 760\" xmlns=\"http://www.w3.org/2000/svg\">\n      <defs>\n        <marker id=\"arrowV2\" viewBox=\"0 0 10 10\" refX=\"8\" refY=\"5\" markerWidth=\"7\" markerHeight=\"7\" orient=\"auto-start-reverse\">\n          <path d=\"M0,0 L10,5 L0,10 z\" fill=\"#d0dce8\"/>\n        <\/marker>\n      <\/defs>\n\n      <!-- Flow arrows -->\n      <!-- 1: Embed → Scan (unchanged) -->\n      <path fill=\"none\" stroke=\"#d0dce8\" stroke-width=\"1.75\" marker-end=\"url(#arrowV2)\" d=\"M 505.9,144.4 A 260 260 0 0 0 677.1,235.6\"/>\n      <!-- 2: Scan → Signal (starts below \"2 · Scan\" label at y=334) -->\n      <path fill=\"none\" stroke=\"#d0dce8\" stroke-width=\"1.75\" marker-end=\"url(#arrowV2)\" d=\"M 723,334 A 260 260 0 0 0 723,488\"/>\n      <!-- 3: Signal → Build (unchanged) -->\n      <path fill=\"none\" stroke=\"#d0dce8\" stroke-width=\"1.75\" marker-end=\"url(#arrowV2)\" d=\"M 675.7,561.6 A 260 260 0 0 0 507.3,638.4\"/>\n      <!-- 4: Build → Prove (unchanged) -->\n      <path fill=\"none\" stroke=\"#d0dce8\" stroke-width=\"1.75\" marker-end=\"url(#arrowV2)\" d=\"M 414.2,635.4 A 260 260 0 0 0 282.8,564.6\"/>\n      <!-- 5: Prove → Live (ends below \"6 · Live\" label at y=338) -->\n      <path fill=\"none\" stroke=\"#d0dce8\" stroke-width=\"1.75\" marker-end=\"url(#arrowV2)\" d=\"M 237,488 A 260 260 0 0 0 237,338\"/>\n      <!-- 6: Live → Embed (unchanged) -->\n      <path fill=\"none\" stroke=\"#d0dce8\" stroke-width=\"1.75\" marker-end=\"url(#arrowV2)\" d=\"M 281,232.4 A 260 260 0 0 0 416,147.6\"/>\n\n      <!-- Default center text -->\n      <g id=\"svgCenterText\">\n        <text font-size=\"34\" font-weight=\"800\" fill=\"#0d2d6b\" text-anchor=\"middle\" letter-spacing=\"-0.01em\" x=\"460\" y=\"365\">Agentic<\/text>\n        <text font-size=\"34\" font-weight=\"800\" fill=\"#0d2d6b\" text-anchor=\"middle\" letter-spacing=\"-0.01em\" x=\"460\" y=\"405\">Pod<\/text>\n      <\/g>\n\n      <!-- Step 1: Embed (top) — label only, no captions -->\n      <circle cx=\"460\" cy=\"120\" r=\"46\" fill=\"#0d2d6b\"/>\n      <g transform=\"translate(460,120)\" stroke=\"#ffffff\" stroke-width=\"2.4\" fill=\"none\">\n        <circle cx=\"-7.5\" cy=\"0\" r=\"8\"/>\n        <circle cx=\"7.5\" cy=\"0\" r=\"8\"/>\n      <\/g>\n      <text font-size=\"14\" font-weight=\"700\" fill=\"#0d2d6b\" text-anchor=\"middle\" x=\"460\" y=\"184\">1 · Embed<\/text>\n\n      <!-- Step 2: Scan (top-right) — label directly under circle, no rect, no captions -->\n      <circle cx=\"723\" cy=\"260\" r=\"46\" fill=\"#006699\"/>\n      <g transform=\"translate(723,260)\" stroke=\"#ffffff\" stroke-width=\"2.4\" fill=\"none\">\n        <path d=\"M-12.5,0 Q0,-10.5 12.5,0 Q0,10.5 -12.5,0 Z\"/>\n        <circle cx=\"0\" cy=\"0\" r=\"3.5\" fill=\"#ffffff\" stroke=\"none\"/>\n      <\/g>\n      <text font-size=\"14\" font-weight=\"700\" fill=\"#0d2d6b\" text-anchor=\"middle\" x=\"723\" y=\"324\">2 · Scan<\/text>\n\n      <!-- Step 3: Signal (bottom-right) — label only, no captions -->\n      <circle cx=\"723\" cy=\"540\" r=\"46\" fill=\"#0069AA\"/>\n      <g transform=\"translate(723,540)\" stroke=\"#ffffff\" stroke-width=\"2.4\" fill=\"none\" stroke-linecap=\"round\">\n        <circle cx=\"0\" cy=\"8.5\" r=\"2.2\" fill=\"#ffffff\" stroke=\"none\"/>\n        <path d=\"M-7,3.5 A9,9 0 0 1 7,3.5\"/>\n        <path d=\"M-12.5,-2.5 A16,16 0 0 1 12.5,-2.5\"/>\n      <\/g>\n      <text font-size=\"14\" font-weight=\"700\" fill=\"#0d2d6b\" text-anchor=\"middle\" x=\"723\" y=\"604\">3 · Signal<\/text>\n\n      <!-- Step 4: Build (bottom) — label only, no captions -->\n      <circle cx=\"460\" cy=\"660\" r=\"46\" fill=\"#004F82\"/>\n      <g transform=\"translate(460,660)\" stroke=\"#ffffff\" stroke-width=\"2.4\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n        <path d=\"M-4.5,-8.5 L-12.5,0 L-4.5,8.5\"/>\n        <path d=\"M4.5,-8.5 L12.5,0 L4.5,8.5\"/>\n      <\/g>\n      <text font-size=\"14\" font-weight=\"700\" fill=\"#0d2d6b\" text-anchor=\"middle\" x=\"460\" y=\"724\">4 · Build<\/text>\n\n      <!-- Step 5: Prove (bottom-left) — label only, no captions -->\n      <circle cx=\"237\" cy=\"540\" r=\"46\" fill=\"#003560\"/>\n      <g transform=\"translate(237,540)\" stroke=\"#ffffff\" stroke-width=\"2.6\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n        <path d=\"M-8.5,0 L-1.5,8 L10.5,-8.5\"/>\n      <\/g>\n      <text font-size=\"14\" font-weight=\"700\" fill=\"#0d2d6b\" text-anchor=\"middle\" x=\"237\" y=\"604\">5 · Prove<\/text>\n\n      <!-- Step 6: Live (top-left) — label directly under circle, no rect, no captions -->\n      <circle cx=\"237\" cy=\"260\" r=\"46\" fill=\"#00C99C\"/>\n      <g transform=\"translate(237,260)\" stroke=\"#ffffff\" stroke-width=\"2.4\" fill=\"none\">\n        <circle cx=\"0\" cy=\"0\" r=\"10.5\"/>\n        <circle cx=\"0\" cy=\"0\" r=\"3.2\" fill=\"#ffffff\" stroke=\"none\"/>\n      <\/g>\n      <text font-size=\"14\" font-weight=\"700\" fill=\"#0d2d6b\" text-anchor=\"middle\" x=\"237\" y=\"324\">6 · Live<\/text>\n\n      <!-- Invisible hover hit areas -->\n      <circle class=\"node-hit\" data-step=\"embed\"  cx=\"460\" cy=\"120\" r=\"58\" fill=\"transparent\" style=\"cursor:pointer\"/>\n      <circle class=\"node-hit\" data-step=\"scan\"   cx=\"723\" cy=\"260\" r=\"58\" fill=\"transparent\" style=\"cursor:pointer\"/>\n      <circle class=\"node-hit\" data-step=\"signal\" cx=\"723\" cy=\"540\" r=\"58\" fill=\"transparent\" style=\"cursor:pointer\"/>\n      <circle class=\"node-hit\" data-step=\"build\"  cx=\"460\" cy=\"660\" r=\"58\" fill=\"transparent\" style=\"cursor:pointer\"/>\n      <circle class=\"node-hit\" data-step=\"prove\"  cx=\"237\" cy=\"540\" r=\"58\" fill=\"transparent\" style=\"cursor:pointer\"/>\n      <circle class=\"node-hit\" data-step=\"live\"   cx=\"237\" cy=\"260\" r=\"58\" fill=\"transparent\" style=\"cursor:pointer\"/>\n    <\/svg>\n\n  <\/div>\n\n  <div class=\"benefits\">\n    <div class=\"benefit\">\n      <svg viewBox=\"0 0 24 24\"><circle cx=\"12\" cy=\"12\" r=\"9\"/><line x1=\"12\" y1=\"12\" x2=\"12\" y2=\"7\"/><line x1=\"12\" y1=\"12\" x2=\"15.5\" y2=\"13.5\"/><\/svg>\n      <div><p class=\"b-title\">Minutes, not hours<\/p><p class=\"b-sub\">Work that used to take hours now takes minutes.<\/p><\/div>\n    <\/div>\n    <div class=\"benefit\">\n      <svg viewBox=\"0 0 24 24\"><circle cx=\"12\" cy=\"12\" r=\"9\"/><text x=\"12\" y=\"16\" font-size=\"11\" font-weight=\"800\" text-anchor=\"middle\" stroke=\"none\" fill=\"#0d2d6b\">$<\/text><\/svg>\n      <div><p class=\"b-title\">Lower cost to run<\/p><p class=\"b-sub\">Same output, less overhead.<\/p><\/div>\n    <\/div>\n    <div class=\"benefit\">\n      <svg viewBox=\"0 0 24 24\"><line x1=\"4\" y1=\"19\" x2=\"20\" y2=\"19\"/><line x1=\"7\" y1=\"18\" x2=\"7\" y2=\"12\"/><line x1=\"13\" y1=\"18\" x2=\"13\" y2=\"8\"/><line x1=\"19\" y1=\"18\" x2=\"19\" y2=\"4\"/><\/svg>\n      <div><p class=\"b-title\">Faster decisions<\/p><p class=\"b-sub\">Real time insight instead of a lagging report.<\/p><\/div>\n    <\/div>\n    <div class=\"benefit\">\n      <svg viewBox=\"0 0 24 24\"><circle cx=\"12\" cy=\"8\" r=\"3.2\"/><path d=\"M5 19c0-4 3-6.5 7-6.5s7 2.5 7 6.5\"/><\/svg>\n      <div><p class=\"b-title\">Time back for real work<\/p><p class=\"b-sub\">Experts spend it on judgment, not busywork.<\/p><\/div>\n    <\/div>\n  <\/div>\n<\/div>\n\n<script>\n  var steps = {\n    embed: {\n      dir: 'dir-top',\n      color: '#0d2d6b',\n      label: '1 · Embed',\n      title: 'Context first',\n      body: 'Sit with the expert before building. The agent is only as good as the context you capture at this step.'\n    },\n    scan: {\n      dir: 'dir-tr',\n      color: '#006699',\n      label: '2 · Scan',\n      title: 'Map what actually happens',\n      body: 'Shadow and document before building anything. You cannot automate work you have not understood.'\n    },\n    signal: {\n      dir: 'dir-br',\n      color: '#0069AA',\n      label: '3 · Signal',\n      title: 'One thread, not many',\n      body: 'Inventory every tool already running. The agent is the interface. Systems of record stay as the backend.'\n    },\n    build: {\n      dir: 'dir-bottom',\n      color: '#004F82',\n      label: '4 · Build',\n      title: 'End to end',\n      body: 'More agents with specific tasks does not mean better output. Handoffs and latency slow the whole system down.'\n    },\n    prove: {\n      dir: 'dir-bl',\n      color: '#003560',\n      label: '5 · Prove',\n      title: 'Adoption is not the outcome',\n      body: 'Getting others to use it proves nothing on its own. Something downstream has to actually change.'\n    },\n    live: {\n      dir: 'dir-tl',\n      color: '#00C99C',\n      label: '6 · Live',\n      title: 'Ship is where measurement starts',\n      body: 'Did the deal close faster? Did someone get their evening back? That is the question shipping is supposed to answer.'\n    }\n  };\n\n  var svgText    = document.getElementById('svgCenterText');\n  var detail     = document.getElementById('centerDetail');\n  var dStep      = document.getElementById('dStep');\n  var dTitle     = document.getElementById('dTitle');\n  var dBody      = document.getElementById('dBody');\n  var dirClasses = ['dir-top','dir-tr','dir-br','dir-bottom','dir-bl','dir-tl'];\n\n  document.querySelectorAll('.node-hit').forEach(function(node) {\n    node.addEventListener('mouseenter', function() {\n      var s = steps[this.dataset.step];\n      if (!s) return;\n      svgText.classList.add('hidden');\n      dirClasses.forEach(function(c) { detail.classList.remove(c); });\n      detail.classList.remove('visible');\n      detail.classList.add(s.dir);\n      dStep.textContent  = s.label;\n      dStep.style.color  = s.color;\n      dTitle.textContent = s.title;\n      dBody.textContent  = s.body;\n      void detail.offsetWidth;\n      detail.classList.add('visible');\n    });\n    node.addEventListener('mouseleave', function() {\n      detail.classList.remove('visible');\n      svgText.classList.remove('hidden');\n    });\n  });\n<\/script>\n<\/body>\n<\/html>\n"}]</script>
<script>
  var docs = JSON.parse(document.getElementById('docs').textContent);
  var framesHost = document.getElementById('frames');
  var titles = ['Skalatsky & Associates'];

  docs.forEach(function(d, i){
    var wrap = document.createElement('div');
    wrap.className = 'slide';
    wrap.dataset.idx = i + 1;
    var f = document.createElement('iframe');
    f.setAttribute('title', d.title);
    f.srcdoc = d.html;
    wrap.appendChild(f);
    framesHost.appendChild(wrap);
    titles.push(d.title);
  });
  titles.push('Contact');

  var slides = [document.getElementById('coverOpen')]
    .concat(Array.prototype.slice.call(framesHost.children))
    .concat([document.getElementById('coverClose')]);

  var dotsHost = document.getElementById('dots');
  slides.forEach(function(_, i){
    var b = document.createElement('button');
    b.setAttribute('aria-label', 'Go to slide ' + (i + 1));
    b.addEventListener('click', function(){ go(i); });
    dotsHost.appendChild(b);
  });

  var cur = 0;
  function go(n){
    if (n < 0 || n >= slides.length) return;
    slides[cur].classList.remove('active');
    dotsHost.children[cur].classList.remove('on');
    cur = n;
    slides[cur].classList.add('active');
    dotsHost.children[cur].classList.add('on');
    document.getElementById('slideLabel').textContent = titles[cur];
    document.getElementById('count').textContent = (cur + 1) + ' / ' + slides.length;
  }

  document.getElementById('prev').addEventListener('click', function(){ go(cur - 1); });
  document.getElementById('next').addEventListener('click', function(){ go(cur + 1); });
  document.addEventListener('keydown', function(e){
    if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') { e.preventDefault(); go(cur + 1); }
    if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); go(cur - 1); }
    if (e.key === 'Home') { e.preventDefault(); go(0); }
    if (e.key === 'End') { e.preventDefault(); go(slides.length - 1); }
  });

  go(0);
</script>
